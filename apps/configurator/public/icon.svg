<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFC95A"/>
      <stop offset="100%" stop-color="#F09A22"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8"
        flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Bakgrund -->
  <path filter="url(#shadow)"
        d="M70 40
           h300
           a100 100 0 0 1 100 100
           v250
           a50 50 0 0 1-50 50
           h-350
           a50 50 0 0 1-50-50
           v-300
           a50 50 0 0 1 50-50z"
        rx="45"
        fill="url(#bg)"/>

  <!-- Ring -->
  <circle cx="256" cy="220" r="175"
          fill="none"
          stroke="#8F5514"
          stroke-width="8"/>

  <!-- Rubrik -->
  <text x="256" y="105"
        text-anchor="middle"
        font-family="Arial"
        font-size="64"
        font-weight="700"
        fill="white">
    FRED
  </text>

  <!-- Kugghjul -->
  <g transform="translate(256 235)">
    <circle r="70"
            fill="#F3A63A"
            stroke="#9B5A18"
            stroke-width="8"/>

    <circle r="42"
            fill="#FFF7E9"/>

    <!-- Kuggar -->
    <g fill="#F3A63A" stroke="#9B5A18" stroke-width="8">
      <rect x="-12" y="-92" width="24" height="24"/>
      <rect x="-12" y="68" width="24" height="24"/>
      <rect x="-92" y="-12" width="24" height="24"/>
      <rect x="68" y="-12" width="24" height="24"/>

      <rect transform="rotate(45)" x="-12" y="-92" width="24" height="24"/>
      <rect transform="rotate(45)" x="-12" y="68" width="24" height="24"/>
      <rect transform="rotate(-45)" x="-12" y="-92" width="24" height="24"/>
      <rect transform="rotate(-45)" x="-12" y="68" width="24" height="24"/>
    </g>

    <!-- Byggnad -->
    <g fill="#D68A2B" stroke="#8F5514" stroke-width="4">
      <rect x="-18" y="-10" width="36" height="45"/>
      <rect x="18" y="5" width="20" height="30"/>
      <line x1="-6" y1="0" x2="-6" y2="30"/>
      <line x1="6" y1="0" x2="6" y2="30"/>
      <line x1="-18" y1="10" x2="18" y2="10"/>
    </g>

    <!-- Cirkulära pilar -->
    <path d="M-78 -8
             A78 78 0 0 1 0 -78"
          fill="none"
          stroke="#9B5A18"
          stroke-width="10"
          stroke-linecap="round"/>

    <polygon points="-80,-18 -103,-5 -78,7"
             fill="#9B5A18"/>

    <path d="M78 8
             A78 78 0 0 1 0 78"
          fill="none"
          stroke="#9B5A18"
          stroke-width="10"
          stroke-linecap="round"/>

    <polygon points="80,18 103,5 78,-7"
             fill="#9B5A18"/>

  </g>

  <!-- Underrubrik -->
  <text x="256" y="430"
        text-anchor="middle"
        font-family="Arial"
        font-size="36"
        fill="white">
    KONFIGURATÖR
  </text>

</svg>