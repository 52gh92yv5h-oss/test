<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#39B7D6"/>
      <stop offset="100%" stop-color="#0B6F88"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Badge background -->
  <path d="M60 60 h332 a60 60 0 0 1 60 60 v272 a60 60 0 0 1 -60 60 h-20 l-60 40 10-40 h-262 a60 60 0 0 1 -60 -60 v-272 a60 60 0 0 1 60 -60 z"
        fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Outer rings -->
  <circle cx="256" cy="230" r="185" fill="none" stroke="#083B4A" stroke-width="8"/>
  <circle cx="256" cy="230" r="172" fill="none" stroke="#7FE6FF" stroke-opacity="0.35" stroke-width="3"/>

  <!-- Title -->
  <text x="256" y="95"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="52"
        font-weight="700"
        fill="#FFFFFF">FRED</text>

  <!-- Windows window -->
  <g transform="translate(140 135)">
    <!-- Main window -->
    <rect x="0" y="0" width="160" height="190" rx="12" fill="#FFFFFF" stroke="#083B4A" stroke-width="5"/>
    
    <!-- Title bar -->
    <rect x="0" y="0" width="160" height="26" rx="12" fill="#0B6F88"/>
    <text x="40" y="18" font-family="Arial" font-size="10" font-weight="700" fill="#FFFFFF">FRED</text>
    
    <!-- Window controls -->
    <circle cx="144" cy="7" r="3.5" fill="#6BCB77"/>
    <circle cx="154" cy="7" r="3.5" fill="#FFD93D"/>

    <!-- Content area with Windows style -->
    <rect x="0" y="26" width="160" height="164" fill="#F0F0F0"/>
    
    <!-- Menu bar -->
    <rect x="0" y="26" width="160" height="18" fill="#E8E8E8" stroke="#083B4A" stroke-width="1"/>
    <text x="4" y="38" font-family="Arial" font-size="9" fill="#000">File  Edit  View</text>

    <!-- Toolbar -->
    <rect x="0" y="44" width="160" height="14" fill="#D0D0D0" stroke="#083B4A" stroke-width="1"/>
    <g fill="#083B4A" opacity="0.6">
      <rect x="4" y="46" width="8" height="8"/>
      <rect x="16" y="46" width="8" height="8"/>
      <rect x="28" y="46" width="8" height="8"/>
    </g>

    <!-- Content lines -->
    <g stroke="#083B4A" stroke-width="2" stroke-linecap="round">
      <line x1="8" y1="62" x2="152" y2="62"/>
      <line x1="8" y1="76" x2="148" y2="76"/>
      <line x1="8" y1="90" x2="140" y2="90"/>
      <line x1="8" y1="104" x2="152" y2="104"/>
      <line x1="8" y1="118" x2="130" y2="118"/>
      <line x1="8" y1="132" x2="145" y2="132"/>
      <line x1="8" y1="146" x2="138" y2="146"/>
      <line x1="8" y1="160" x2="152" y2="160"/>
    </g>

    <!-- Status bar -->
    <rect x="0" y="172" width="160" height="18" fill="#E8E8E8" stroke="#083B4A" stroke-width="1"/>
    <text x="4" y="183" font-family="Arial" font-size="8" fill="#000">Ready</text>
  </g>

  <!-- Subtitle -->
  <text x="256" y="410"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="28"
        font-weight="500"
        fill="#FFFFFF">WINDOWS</text>
</svg>