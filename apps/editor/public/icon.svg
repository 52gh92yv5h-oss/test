<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#39B7D6"/>
      <stop offset="100%" stop-color="#0B6F88"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Badge background -->
  <path d="M60 60 h332 a60 60 0 0 1 60 60 v272 a60 60 0 0 1 -60 60 h-20 l-60 40 10-40 h-262 a60 60 0 0 1 -60 -60 v-272 a60 60 0 0 1 60 -60 z"
        fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Outer rings -->
  <circle cx="256" cy="230" r="185" fill="none" stroke="#083B4A" stroke-width="8"/>
  <circle cx="256" cy="230" r="172" fill="none" stroke="#7FE6FF" stroke-opacity="0.35" stroke-width="3"/>

  <!-- Title -->
  <text x="256" y="95"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="52"
        font-weight="700"
        fill="#FFFFFF">FRED</text>

  <!-- Code editor window -->
  <g transform="translate(140 135)">
    <!-- Window frame -->
    <rect x="0" y="0" width="160" height="190" rx="16" fill="#FFFFFF" stroke="#083B4A" stroke-width="5"/>
    
    <!-- Title bar -->
    <rect x="0" y="0" width="160" height="28" rx="16" fill="#0B6F88"/>
    <circle cx="16" cy="14" r="3" fill="#FF6B6B"/>
    <circle cx="32" cy="14" r="3" fill="#FFD93D"/>
    <circle cx="48" cy="14" r="3" fill="#6BCB77"/>

    <!-- Code lines -->
    <g stroke="#083B4A" stroke-width="3" stroke-linecap="round">
      <line x1="12" y1="42" x2="60" y2="42"/>
      <line x1="12" y1="60" x2="148" y2="60"/>
      <line x1="12" y1="78" x2="140" y2="78"/>
      <line x1="12" y1="96" x2="128" y2="96"/>
      <line x1="12" y1="114" x2="100" y2="114"/>
      <line x1="12" y1="132" x2="120" y2="132"/>
      <line x1="12" y1="150" x2="135" y2="150"/>
      <line x1="12" y1="168" x2="110" y2="168"/>
    </g>
  </g>

  <!-- Cursor/Pointer -->
  <g transform="translate(290 250) scale(1.5)">
    <path d="M0 0 L12 14 L8 16 L0 8 Z" fill="#1C7F99" stroke="#083B4A" stroke-width="2"/>
  </g>

  <!-- Subtitle -->
  <text x="256" y="410"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="32"
        font-weight="500"
        fill="#FFFFFF">EDITOR</text>
</svg>